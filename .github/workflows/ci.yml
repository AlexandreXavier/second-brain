name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Test
        run: npm test

      - name: Build web app
        run: npm run build

  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm install

      - name: Build web renderer
        run: npm run build

      - name: Install desktop dependencies
        run: npm install
        working-directory: electron
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Build desktop app (no publish)
        run: npm run build -- --publish never
        working-directory: electron
